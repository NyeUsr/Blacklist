name: Remove Dead Domains

on:
  schedule:
    - cron: "0 8 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remove-dead-domains

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install PyFunceble
        run: python3 -m pip install PyFunceble==4.3.1
      - name: Remove dead domains
        run: python3 -B Scripts/dead_domain_remover.py
      - name: Update domain-only list
        run: python3 -B Scripts/domains_extractor.py
      - name: Commit changes
        run: |
          git add Main "Mixed Content" Porn Domains
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove dead domains"
          git push
